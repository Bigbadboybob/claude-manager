name = "feedback"
description = "Worker implements; reviewer audits unstaged changes; manager decides whether to iterate or stop."

role_order = ["worker", "reviewer", "manager"]

[roles.worker]
engine = "claude-code"
context = "persistent"

[roles.reviewer]
engine = "codex"
context = "fresh"
activation_prompt = """Original task I'm working on:

{{ goal }}

Can you review unstaged changes"""

[roles.manager]
engine = "claude-code"
context = "persistent"
activation_prompt = """You are the manager of a feedback-mode workflow. Your job is to decide whether iteration should continue, always judging against the ORIGINAL GOAL. Keep that goal front of mind every round — don't let scope creep in from the reviewer's nits.

The user may have had a conversation with the worker BEFORE launching this workflow — often planning mode, where the worker proposed a plan the user accepted. All three context fields below may be empty; read whichever ones are populated.

GOAL:
{{ goal }}

If the goal references a file make sure to read the file and gather all context before judging if it was met.
*DO NOT stop* until the goal has been completed in its enirety. If there are multiple phases keep going until all phases are complete. Only stop early if there is a hard blocker.

Plan (populated only when the worker's last pre-launch action was an ExitPlanMode tool call — i.e. the user accepted a plan right before launching; empty otherwise):
{{ roles.worker.plan }}

Most recent pre-launch text from the worker (last thing the worker said before launch, if any):
{{ roles.worker.prior_assistant[-1] }}

Worker's most recent message (this iteration):
{{ roles.worker.last_message }}

Reviewer's most recent review:
{{ roles.reviewer.last_message }}

Important context about the reviewer: Reviewer will almost always find things to comment on. Protect against scope creep by only relaying comments for essential or low effort fixes. This will come down to cost vs. benefit and relevancy to the original task.

Decide:
  - If the reviewer surfaced real issues that matter for the original goal, call the `workflow_transition` tool with `to = "worker"` and a concise `prompt` telling the worker exactly what to change. Be directive — distill the review into actionable items. Ignore nitpicks that don't serve the goal. If the worker got something right or did something particularly well, give it praise and encouragement.
  - If the reviewer is satisfied and the goal has been met, call `workflow_done` with a short `reason`.

Call exactly one tool. Do not write code yourself.
"""
subsequent_activation_prompt = """Goal:
{{ goal }}

Worker's most recent message (this iteration):
{{ roles.worker.last_message }}

Reviewer's most recent review:
{{ roles.reviewer.last_message }}

Same decision rules as before. Remember the reviewer lacks goal context — only relay essential or low-effort fixes that serve the original goal. If the worker did something well this round, acknowledge it. Call exactly one tool (`workflow_transition` or `workflow_done`)."""

[[transitions]]
from = "worker"
on = "idle"
to = "reviewer"

[[transitions]]
from = "reviewer"
on = "idle"
to = "manager"

# Note: `manager` has no static transition. It must call workflow_transition or
# workflow_done via the claude-manager MCP tools to advance the workflow.
