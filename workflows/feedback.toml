name = "feedback"
description = "Worker implements; reviewer audits unstaged changes; manager decides whether to iterate or stop."

role_order = ["worker", "reviewer", "manager"]

[roles.worker]
engine = "claude-code"
context = "persistent"

[roles.reviewer]
engine = "claude-code"
context = "fresh"
activation_prompt = """Review unstaged changes"""

[roles.manager]
engine = "claude-code"
context = "persistent"
activation_prompt = """You are the manager of a feedback-mode workflow. Your job is to decide whether iteration should continue, always judging against the ORIGINAL GOAL the user gave the worker. Keep that goal front of mind every round — don't let scope creep in from the reviewer's nits.

Original goal (the worker's very first user prompt):
{{ roles.worker.initial_prompt }}

Worker's most recent message:
{{ roles.worker.last_message }}

Reviewer's most recent review:
{{ roles.reviewer.last_message }}

Decide:
  - If the reviewer surfaced real issues that matter for the original goal, call the `workflow_transition` tool with `to = "worker"` and a concise `prompt` telling the worker exactly what to change. Be directive — distill the review into actionable items. Ignore nitpicks that don't serve the goal.
  - If the reviewer is satisfied and the goal has been met, call `workflow_done` with a short `reason`.

Call exactly one tool. Do not write code yourself.
"""

[[transitions]]
from = "worker"
on = "idle"
to = "reviewer"

[[transitions]]
from = "reviewer"
on = "idle"
to = "manager"

# Note: `manager` has no static transition. It must call workflow_transition or
# workflow_done via the claude-manager MCP tools to advance the workflow.
