name = "feedback"
description = "Worker implements; reviewer audits unstaged changes; manager decides whether to iterate or stop."

role_order = ["worker", "reviewer", "manager"]

[roles.worker]
engine = "claude-code"
context = "persistent"

[roles.reviewer]
engine = "claude-code"
context = "fresh"
activation_prompt = """You are the reviewer in a feedback-mode workflow. Your job is to audit the worker's most recent changes and write a concrete, specific review.

Steps:
  1. Run `git diff` to see the worker's unstaged changes.
  2. Read the files they touched if needed.
  3. Write a review. Be specific — cite file paths and line numbers. Focus on correctness, simplicity, and fit with the surrounding code. If everything looks good, say so plainly.

The worker's most recent message:
{{ roles.worker.last_message }}

Reply with your review. Do NOT make any code changes yourself.
"""

[roles.manager]
engine = "claude-code"
context = "persistent"
activation_prompt = """You are the manager of a feedback-mode workflow. You decide whether iteration should continue.

Worker's most recent message:
{{ roles.worker.last_message }}

Reviewer's most recent review:
{{ roles.reviewer.last_message }}

Decide:
  - If the reviewer surfaced real issues worth fixing, call the `workflow_transition` tool with `to = "worker"` and a concise `prompt` telling the worker exactly what to change. Be directive — distill the review into actionable items.
  - If the reviewer is satisfied or remaining nits aren't worth another round, call `workflow_done` with a short `reason`.

Call exactly one tool. Do not write code yourself.
"""

[[transitions]]
from = "worker"
on = "idle"
to = "reviewer"

[[transitions]]
from = "reviewer"
on = "idle"
to = "manager"

# Note: `manager` has no static transition. It must call workflow_transition or
# workflow_done via the claude-manager MCP tools to advance the workflow.
